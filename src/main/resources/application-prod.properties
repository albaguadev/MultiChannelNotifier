# Production profile - PostgreSQL

# Datasource (override with environment variables in production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/notifier}
spring.datasource.username=${DATABASE_USERNAME:notifier}
spring.datasource.password=${DATABASE_PASSWORD:notifier}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
